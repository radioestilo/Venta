<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Construcción - Playlist</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; cursor: pointer;
        }

        .video-wrapper {
            position: relative;
            height: 90vh;
            aspect-ratio: 9 / 16;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        .vertical-video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            z-index: 1;
        }

        /* Degradados para mezcla con el fondo */
        .video-wrapper::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 25%;
            background: linear-gradient(to bottom, #1e3c72 0%, rgba(30, 60, 114, 0) 100%);
            z-index: 2; pointer-events: none;
        }

        .video-wrapper::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, #2a5298 0%, rgba(42, 82, 152, 0) 100%);
            z-index: 2; pointer-events: none;
        }

        .contenedor-texto {
            padding: 30px;
            z-index: 3;
            width: 100%;
            box-sizing: border-box;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 3px 15px rgba(0, 0, 0, 0.9);
        }

        #aviso {
            position: absolute; top: 10px; font-size: 0.8rem; opacity: 0.6; z-index: 10;
        }
    </style>
</head>
<body onclick="activarTodo()">

    <div id="aviso">Toca para activar sonido 🔊</div>

    <div class="video-wrapper">
        <video id="vid" autoplay muted playsinline class="vertical-video">
            <source src="" id="videoSource" type="video/mp4">
        </video>

        <div class="contenedor-texto">
            <h1>¡ESTAMOS TRABAJANDO!</h1>
        </div>
    </div>

    <script>
        // 1. LISTA DE VIDEOS: Agrega aquí todos los que quieras
        const playlist = [
            'video1.mp4',
            'video2.mp4',
            'video3.mp4',
            'video4.mp4'
        ];

        let currentIndex = 0;
        const videoPlayer = document.getElementById('vid');
        const aviso = document.getElementById('aviso');

        // Función para cargar y reproducir el siguiente video
        function cargarVideo(index) {
            videoPlayer.src = playlist[index];
            videoPlayer.load();
            videoPlayer.play().catch(e => console.log("Esperando interacción..."));
        }

        // Al cargar la página, ponemos el primero
        window.onload = () => {
            cargarVideo(currentIndex);
        };

        // EVENTO CLAVE: Cuando termina un video, pasa al siguiente
        videoPlayer.onended = () => {
            currentIndex++; // Sumamos 1 al índice
            if (currentIndex >= playlist.length) {
                currentIndex = 0; // Si llegamos al final, volvemos al primero
            }
            cargarVideo(currentIndex);
        };

        // Activa el sonido al tocar la pantalla
        function activarTodo() {
            videoPlayer.muted = false;
            videoPlayer.play();
            aviso.style.display = 'none';
        }
    </script>

</body>
</html>
