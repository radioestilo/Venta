<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Construcción</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; cursor: pointer; /* Indica que se puede hacer clic */
        }

        .video-wrapper {
            position: relative;
            height: 90vh;
            aspect-ratio: 9 / 16;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        .vertical-video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            z-index: 1;
        }

        /* Degradados para mezcla */
        .video-wrapper::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 25%;
            background: linear-gradient(to bottom, #1e3c72 0%, rgba(30, 60, 114, 0) 100%);
            z-index: 2; pointer-events: none;
        }

        .video-wrapper::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, #2a5298 0%, rgba(42, 82, 152, 0) 100%);
            z-index: 2; pointer-events: none;
        }

        .contenedor-texto {
            padding: 30px;
            z-index: 3;
            width: 100%;
            box-sizing: border-box;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 3px 15px rgba(0, 0, 0, 0.9);
        }

        /* Aviso discreto que desaparece al sonar */
        #aviso {
            position: absolute; top: 10px; font-size: 0.8rem; opacity: 0.6; z-index: 10;
        }
    </style>
</head>
<body onclick="activarTodo()">

    <div id="aviso">Toca cualquier parte para activar sonido 🔊</div>

    <div class="video-wrapper">
        <video id="vid" autoplay loop muted playsinline class="vertical-video">
            <source src="video1.mp4" type="video/mp4">
        </video>

        <div class="contenedor-texto">
            <h1>¡ESTAMOS TRABAJANDO!</h1>
        </div>
    </div>

    <script>
        const video = document.getElementById('vid');
        const aviso = document.getElementById('aviso');

        // Intento de reproducción automática con sonido al cargar
        window.addEventListener('load', () => {
            video.muted = false;
            video.play().catch(error => {
                console.log("El navegador bloqueó el audio automático. Esperando clic.");
                video.muted = true; // Lo dejamos mudo para que al menos se vea el video
                video.play();
            });
        });

        // Función que se activa al hacer clic en CUALQUIER PARTE de la pantalla
        function activarTodo() {
            video.muted = false;
            video.play();
            aviso.style.display = 'none'; // Quitamos el aviso
        }
    </script>

</body>
</html>
